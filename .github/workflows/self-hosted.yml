name: self-hosted-runner-workflow

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  job1:
    runs-on: [self-hosted]
    steps:
      - name: Python Version
        run: python3 --version

  job2:
    runs-on: [self-hosted]
    steps:
     - name: npm Version
       run: npm --version
