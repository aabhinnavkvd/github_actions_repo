name: self-hosted-runner-workflow

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  job1:
    runs-on: [self-hosted, python]
    steps:
      - name: Python3 Version
        run: python --version

  job2:
    runs-on: [self-hosted, npm]
    steps:
     - name: npm Version
       run: npm --version
