name: Python GitHub Actions Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  code-checkout-and-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6.0.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - run: pip install -r requirements.txt