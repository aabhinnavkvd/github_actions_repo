name: Python GitHub Actions Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  code-checkout-and-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6.0.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - run: pip install -r requirements.txt

      - name: Run Tests
        run: |
          mkdir -p test-results/
          pytest --cov=. --cov-report=xml --junitxml=test-results/test-results.xml

      - name: Upload Test artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/
  
  Codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: [ 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.0
       
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: 'Security'

  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@4bd40bf8411ed104853e94a3746ec92bc92845fde2b27dbf5c33fb5cfa8ecbe9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}