name: Python GitHub Actions Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  code-checkout-and-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v6.0.0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' 
      - run: pip install -r requirements.txt

      - name: Run Tests
        run: |
          mkdir -p test-results/
          pytest --cov=. --cov-report=xml --junitxml=test-results/test-results.xml

      - name: Upload Test artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: test-results/